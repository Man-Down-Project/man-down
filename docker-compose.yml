services:
  mqtt-broker:
    container_name: mqtt-broker
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1884:1883"
    volumes:
      - ./fog/mosquitto-demo.conf:/mosquitto/config/mosquitto.conf

  fog:
    container_name: fog
    build: ./fog
    restart: unless-stopped
    depends_on:
      - mqtt-broker
    environment:
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      MQTT_USE_TLS: false
      MQTT_TOPICS: mesh/node/+
      MQTT_CLIENT_ID: fog-docker
      DB_KEY: <dev-key>
      DB_PATH: /app/data/fog.db
    volumes:
      - ./fog/data:/app/data

  edge-sim:
    container_name: edge-sim
    build: ./edge_sim
    restart: unless-stopped
    depends_on:
      - mqtt-broker

  subscriber:
    container_name: subscriber
    build: ./edge_sim
    command: ["python", "subscriber.py"]
    depends_on:
      - mqtt-broker

name: Build fog for Raspberry Pi Zero 2 W

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-pi32:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fog

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add armv7-unknown-linux-gnueabihf

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      
      - name: Set up Docker layer caching
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
            
      - name: Build release binary for Raspberry Pi 32-bit
        run: cross build --release --target armv7-unknown-linux-gnueabihf
      

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fog-armv7-unknown-linux-gnueabihf
          path: target/armv7-unknown-linux-gnueabihf/release/fog
          
